<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autentificare — AgentulMeu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    :root {
      --obsidian:   #050c18;
      --navy:       #0a1628;
      --navy-2:     #0f2040;
      --navy-3:     #1a3360;
      --gold:       #d97706;
      --gold-light: #f59e0b;
      --gold-pale:  #fbbf24;
      --teal:       #0d9488;
      --teal-light: #14b8a6;
      --warm-white: #f8f4ef;
      --muted:      #8b9ab5;
      --border:     rgba(255,255,255,0.07);
      --border-gold: rgba(217,119,6,0.3);
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--obsidian);
      color: var(--warm-white);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none; z-index: 0;
    }
    h1, h2, .serif {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400; letter-spacing: -0.02em; line-height: 1.12;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(5,12,24,0.82);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-inner {
      max-width: 1160px; margin: 0 auto; padding: 0 1.5rem;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .nav-logo-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-pale));
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #1a0a00; font-weight: 700;
    }
    .nav-logo-text { font-size: 1.05rem; font-weight: 600; color: var(--warm-white); }
    .nav-logo-text span { color: var(--gold-light); }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-links a { color: rgba(248,244,239,0.65); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--warm-white); }

    /* MAIN */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 1.5rem 4rem; position: relative; z-index: 1;
    }

    /* ORB BG */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }

    /* CARD */
    .login-card {
      width: 100%; max-width: 440px;
      background: rgba(10,22,40,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.5rem 2.25rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(217,119,6,0.07);
      position: relative; z-index: 1;
    }

    .login-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--gold-light); margin-bottom: 0.8rem;
    }
    .login-eyebrow::before, .login-eyebrow::after {
      content: ''; display: block; width: 18px; height: 1px;
      background: var(--gold); opacity: 0.55;
    }
    .login-title { font-size: 1.9rem; margin-bottom: 0.4rem; }
    .login-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.5; }

    /* FORM */
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: rgba(248,244,239,0.65); margin-bottom: 0.5rem; letter-spacing: 0.02em;
    }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 16px; height: 16px; pointer-events: none;
    }
    .field input {
      width: 100%; padding: 0.825rem 1rem 0.825rem 2.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--warm-white);
      font-family: 'DM Sans', sans-serif; font-size: 0.9375rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input::placeholder { color: rgba(139,154,181,0.55); }
    .field input:focus {
      border-color: var(--border-gold);
      box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
    }
    .field-toggle {
      position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.25rem; display: flex; align-items: center;
      transition: color 0.2s;
    }
    .field-toggle:hover { color: var(--warm-white); }

    /* ERROR */
    .error-box {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 0.75rem 1rem;
      font-size: 0.85rem; color: #fca5a5; margin-bottom: 1.25rem;
      align-items: center; gap: 0.5rem;
    }
    .error-box.visible { display: flex; }

    /* SUBMIT BTN */
    .btn-submit {
      width: 100%; padding: 0.9rem 2rem; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold-pale));
      color: #1a0a00; font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem; font-weight: 700; cursor: pointer;
      border: none; transition: all 0.22s; letter-spacing: 0.01em;
      box-shadow: 0 4px 24px rgba(217,119,6,0.35);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(217,119,6,0.52);
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      margin: 1.75rem 0;
    }

    .login-footer {
      text-align: center; font-size: 0.845rem; color: var(--muted);
    }
    .login-footer a { color: var(--gold-light); text-decoration: none; font-weight: 500; }
    .login-footer a:hover { text-decoration: underline; }

    .badge-row {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;
    }
    .badge-item {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.72rem; color: var(--muted);
    }
    .badge-item svg { color: var(--teal-light); }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(26,10,0,0.3);
      border-top-color: #1a0a00; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
  </style>
<link rel="stylesheet" href="/assets/design-system.css">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-mark">A</div>
      <span class="nav-logo-text">Agentul<span>Meu</span></span>
    </a>
    <div class="nav-links">
      <a href="/#features">Features</a>
      <a href="/#pricing">Prețuri</a>
      <a href="/wizard">Wizard</a>
    </div>
  </div>
</nav>

<!-- ORBs decorative -->
<div class="orb" style="width:420px;height:420px;background:rgba(217,119,6,0.07);top:-100px;right:-80px;"></div>
<div class="orb" style="width:320px;height:320px;background:rgba(13,148,136,0.06);bottom:-60px;left:-60px;"></div>

<main>
  <div class="login-card">
    <div class="login-eyebrow">Cont AgentulMeu</div>
    <h2 class="login-title">Bine ai revenit</h2>
    <p class="login-sub">Autentifică-te pentru a accesa dashboard-ul și fișierele agentului tău.</p>

    <div class="error-box" id="errorBox">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">Eroare autentificare</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="field">
        <label for="email">Email sau Username</label>
        <div class="field-wrap">
          <svg class="field-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
          <input type="text" id="email" name="email" placeholder="contact@business.ro" autocomplete="username" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Parolă</label>
        <div class="field-wrap">
          <svg class="field-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="field-toggle" onclick="togglePass()" id="toggleBtn" aria-label="Arată parola">
            <svg id="eyeShow" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeHide" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          Intră în cont
        </span>
      </button>
    </form>

    <div class="divider"></div>

    <div class="login-footer">
      Nu ai cont? <a href="/wizard">Creează un agent gratuit →</a>
    </div>

    <div class="badge-row">
      <div class="badge-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Conexiune securizată
      </div>
      <div class="badge-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Date criptate
      </div>
      <div class="badge-item">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        GDPR Ready
      </div>
    </div>
  </div>
</main>

<script>
  function togglePass() {
    const inp = document.getElementById('password');
    const show = document.getElementById('eyeShow');
    const hide = document.getElementById('eyeHide');
    if (inp.type === 'password') {
      inp.type = 'text'; show.style.display = 'none'; hide.style.display = 'block';
    } else {
      inp.type = 'password'; show.style.display = 'block'; hide.style.display = 'none';
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = msg;
    box.classList.add('visible');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideError();
    const btn = document.getElementById('submitBtn');
    const username = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) { showError('Completează toate câmpurile.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success && data.token) {
        localStorage.setItem('agentulmeu_token', data.token);
        if (data.user) localStorage.setItem('agentulmeu_user', JSON.stringify(data.user));
        // Redirect la dashboard sau la pagina cerută
        const next = new URLSearchParams(window.location.search).get('next') || '/dashboard';
        window.location.href = next;
      } else {
        showError(data.error || data.message || 'Credențiale incorecte. Verifică email-ul și parola.');
      }
    } catch (err) {
      showError('Eroare de conexiune. Verifică serverul.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Auto-redirect doar dacă token-ul e valid
  const token = localStorage.getItem('agentulmeu_token');
  if (token) {
    fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => {
      if (r.ok) window.location.href = '/dashboard';
      else {
        localStorage.removeItem('agentulmeu_token');
        localStorage.removeItem('agentulmeu_user');
      }
    }).catch(() => {
      localStorage.removeItem('agentulmeu_token');
      localStorage.removeItem('agentulmeu_user');
    });
  }
</script>
</body>
</html>
