<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — AgentulMeu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#050c18;color:#f8f4ef;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center}
  .logo{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#d97706;margin-bottom:2rem}
  .spinner{width:48px;height:48px;border:3px solid rgba(217,119,6,0.2);border-top-color:#d97706;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.5rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:0.75rem}
  p{color:#8b9ab5;font-size:0.95rem;line-height:1.6}
  .error-box{display:none;background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:12px;padding:1.25rem;margin-top:1.5rem}
  .error-box p{color:#fca5a5}
  .btn{display:inline-block;margin-top:1.5rem;padding:0.75rem 2rem;border-radius:10px;font-weight:600;font-size:0.95rem;cursor:pointer;text-decoration:none;border:1px solid rgba(255,255,255,0.15);color:#f8f4ef;background:transparent;transition:all 0.2s}
  .btn:hover{background:rgba(255,255,255,0.06)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">AgentulMeu</div>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Se pregătește checkout-ul...</h2>
  <p id="subtitle">Te redirecționăm către pagina de plată securizată Stripe.</p>
  <div class="error-box" id="errorBox">
    <p id="errorMsg">A apărut o eroare. Te rugăm să încerci din nou.</p>
  </div>
  <a href="/#pricing" class="btn" id="backBtn" style="display:none">← Înapoi la planuri</a>
</div>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  let plan = params.get('plan') || '';
  if (plan === 'done-for-you') plan = 'doneforyou';
  const validPlans = ['starter', 'professional', 'doneforyou'];
  if (!validPlans.includes(plan)) {
    showError('Plan invalid. Te rugăm să alegi un plan din pagina de prețuri.');
    return;
  }
  const token = localStorage.getItem('agentulmeu_token');
  if (!token) {
    window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }
  try {
    const res = await fetch('/api/stripe/create-checkout', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ plan })
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      showError(data.error || data.message || 'Eroare la crearea sesiunii de plată.');
      return;
    }
    window.location.href = data.url;
  } catch (err) {
    showError('Eroare de rețea. Verifică conexiunea și încearcă din nou.');
  }
})();
function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Ceva n-a mers bine';
  document.getElementById('subtitle').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('backBtn').style.display = 'inline-block';
}
</script>
</body>
</html>
