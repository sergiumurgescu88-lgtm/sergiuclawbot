  <div class="container">
    <h1>Contul Meu</h1>
    <div id="loading" class="loading">Se încarcă datele...</div>
    <div id="content" style="display:none;">
      <div class="profile-card">
        <img id="avatar" class="avatar" src="" alt="Avatar">

        <h3>Business-urile mele</h3>
        <div id="sessionsList"></div>
      </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function(){
      const SUPABASE_URL = 'https://jwyxywlseonoazarhlzv.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3eXh5d2xzZW9ub2F6YXJobHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjg1NTMsImV4cCI6MjA5NDAwNDU1M30.L-yq0ibWJ3IbPazd09D1t1Qae1GgwCVh3bM8QzRWquI';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const loading = document.getElementById('loading');
      const content = document.getElementById('content');
      const nameEl = document.getElementById('name');
      const emailEl = document.getElementById('email');
      const uidEl = document.getElementById('uid');
      const avatarEl = document.getElementById('avatar');
      const sessionsList = document.getElementById('sessionsList');
      const logoutBtn = document.getElementById('logoutBtn');

      async function init(){
        const { data: { session } } = await sb.auth.getSession();
        if(!session){ window.location.href = '/login'; return; }
        const u = session.user;
        nameEl.textContent = u.user_metadata?.full_name || u.email;
        emailEl.textContent = u.email;
        uidEl.textContent = 'ID: ' + u.id;
        avatarEl.src = u.user_metadata?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.email) + '&background=c9a84c&color=000';
        loading.style.display = 'none';
        content.style.display = 'block';

        try{
          const res = await fetch('/api/auth/my-sessions', {
            headers: { Authorization: 'Bearer ' + session.access_token }
          });
          const data = await res.json();
          if(data.success && data.sessions.length > 0){
            sessionsList.innerHTML = data.sessions.map(s => `
              <div class="session-item">
                <div>
                  <h4>${s.business_name || 'Business nou'}</h4>
                  <p>Pas: ${s.current_step || 0}/8 • ${s.completed ? '✅ Finalizat' : '⏳ În progres'}</p>
                </div>
                <span class="badge">${s.payment_status === 'paid' ? '💳 Plătit' : '🔒 Neplătit'}</span>
              </div>
            `).join('');
          } else {
            sessionsList.innerHTML = '<div class="empty">Nu ai niciun business creat încă. <a href="/wizard" style="color:#c9a84c">Creează primul →</a></div>';
          }
        } catch(e){
          sessionsList.innerHTML = '<div class="empty">Nu s-au putut încărca sesiunile.</div>';
        }
      }

      if(logoutBtn) logoutBtn.onclick = () => sb.auth.signOut().then(() => window.location.href = '/login');
      init();
    })();
  </script>
