  <script>
    (function(){
      const SUPABASE_URL = 'https://jwyxywlseonoazarhlzv.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3eXh5d2xzZW9ub2F6YXJobHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjg1NTMsImV4cCI6MjA5NDAwNDU1M30.L-yq0ibWJ3IbPazd09D1t1Qae1GgwCVh3bM8QzRWquI';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const loading = document.getElementById('loading');
      const content = document.getElementById('content');
      const nameEl = document.getElementById('name');
      const emailEl = document.getElementById('email');
      const uidEl = document.getElementById('uid');
      const avatarEl = document.getElementById('avatar');
      const sessionsList = document.getElementById('sessionsList');
      const logoutBtn = document.getElementById('logoutBtn');

      async function init(){
        const { data: { session } } = await sb.auth.getSession();
        if(!session){ window.location.href = '/login'; return; }
        const u = session.user;
        nameEl.textContent = u.user_metadata?.full_name || u.email;
        emailEl.textContent = u.email;
        uidEl.textContent = 'ID: ' + u.id;
        avatarEl.src = u.user_metadata?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.email) + '&background=c9a84c&color=000';
        loading.style.display = 'none';
        content.style.display = 'block';

        try{
          const res = await fetch('/api/auth/my-sessions', {
            headers: { Authorization: 'Bearer ' + session.access_token }
          });
          const data = await res.json();
          if(data.success && data.sessions.length > 0){
            sessionsList.innerHTML = data.sessions.map(s => `
              <div class="session-item">
                <div>
                  <h4>${s.business_name || 'Business nou'}</h4>
                  <p>Pas: ${s.current_step || 0}/8 • ${s.completed ? '✅ Finalizat' : '⏳ În progres'}</p>
                </div>
                <span class="badge">${s.payment_status === 'paid' ? '💳 Plătit' : '🔒 Neplătit'}</span>
              </div>
            `).join('');
          } else {
            sessionsList.innerHTML = '<div class="empty">Nu ai niciun business creat încă. <a href="/wizard" style="color:#c9a84c">Creează primul →</a></div>';
          }
        } catch(e){
          sessionsList.innerHTML = '<div class="empty">Nu s-au putut încărca sesiunile.</div>';
        }
      }

      if(logoutBtn) logoutBtn.onclick = () => sb.auth.signOut().then(() => window.location.href = '/login');
      init();
    })();
  </script>

<canvas id="sparks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>
<script>
(function(){
  const canvas=document.getElementById('sparks');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLORS=['rgba(201,168,76,','rgba(232,201,106,','rgba(255,180,50,','rgba(255,220,120,','rgba(255,255,200,','rgba(255,140,30,'];
  function rnd(a,b){return Math.random()*(b-a)+a;}
  function create(){return{x:rnd(0,W),y:H+rnd(0,40),size:rnd(0.8,2.8),speedY:rnd(0.6,2.2),speedX:rnd(-0.4,0.4),life:1,decay:rnd(0.004,0.012),wobble:rnd(0,Math.PI*2),wobbleSpeed:rnd(0.02,0.06),wobbleAmp:rnd(0.3,1.2),color:COLORS[Math.floor(Math.random()*COLORS.length)],isEmber:Math.random()<0.15};}
  for(let i=0;i<120;i++){const p=create();p.y=rnd(0,H);p.life=rnd(0.1,1);particles.push(p);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.6)particles.push(create());
    particles.push(create());
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.wobble+=p.wobbleSpeed;p.x+=p.speedX+Math.sin(p.wobble)*p.wobbleAmp;p.y-=p.speedY;p.life-=p.decay;
      if(p.life<=0||p.y<-10){particles.splice(i,1);continue;}
      ctx.save();
      if(p.isEmber){
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);
        g.addColorStop(0,p.color+(p.life*0.9)+')');g.addColorStop(0.4,p.color+(p.life*0.4)+')');g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*4,0,Math.PI*2);ctx.fill();
      } else {
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
        g.addColorStop(0,p.color+(p.life*0.6)+')');g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=p.color+p.life+')';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
    if(particles.length>300)particles.splice(0,particles.length-300);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
