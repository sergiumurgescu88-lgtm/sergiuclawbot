body > *:not(canvas){position:relative;z-index:1}

<div class="card">
  <div class="logo"></div>
  <h1>Creează cont gratuit</h1>
  <p class="subtitle">Începe să-ți construiești agentul AI în 2 minute</p>
  <div class="error" id="error"></div>
  <form id="regForm" style="display:grid;gap:16px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label for="username">Username *</label><input type="text" id="username" required placeholder="username"></div>
      <div><label for="email">Email *</label><input type="email" id="email" required placeholder="email@exemplu.ro"></div>
    </div>
    <div><label for="full_name">Nume complet</label><input type="text" id="full_name" placeholder="Prenume Nume"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label for="password">Parolă *</label><input type="password" id="password" required placeholder="minim 6 caractere"></div>
      <div><label for="password2">Confirmă parola *</label><input type="password" id="password2" required placeholder="repetă parola"></div>
    </div>
    <button type="submit" class="btn btn-primary">Creează Cont</button>
  </form>
  <p class="link">Ai deja cont? <a href="/login">Autentificare</a></p>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Se creează contul...'; btn.disabled = true;
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;
  if (p1 !== p2) {
    const err = document.getElementById('error');
    err.textContent = 'Parolele nu coincid';
    err.style.display = 'block';
    btn.textContent = 'Creează Cont'; btn.disabled = false;
    return;
  }
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: p1,
        full_name: document.getElementById('full_name').value
      })
    });
    const d = await r.json();
    if (d.token) {
      localStorage.setItem('agentulmeu_token', d.token);
      window.location.href = '/dashboard';
    } else {
      const err = document.getElementById('error');
      err.textContent = d.error || 'Înregistrare eșuată';
      err.style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error').textContent = 'Eroare de conexiune';
    document.getElementById('error').style.display = 'block';
  }
  btn.textContent = 'Creează Cont'; btn.disabled = false;
});
</script>

<canvas id="sparks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>
<script>
(function(){
  const canvas=document.getElementById('sparks');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLORS=['rgba(201,168,76,','rgba(232,201,106,','rgba(255,180,50,','rgba(255,220,120,','rgba(255,255,200,','rgba(255,140,30,'];
  function rnd(a,b){return Math.random()*(b-a)+a;}
  function create(){return{x:rnd(0,W),y:H+rnd(0,40),size:rnd(0.8,2.8),speedY:rnd(0.6,2.2),speedX:rnd(-0.4,0.4),life:1,decay:rnd(0.004,0.012),wobble:rnd(0,Math.PI*2),wobbleSpeed:rnd(0.02,0.06),wobbleAmp:rnd(0.3,1.2),color:COLORS[Math.floor(Math.random()*COLORS.length)],isEmber:Math.random()<0.15};}
  for(let i=0;i<120;i++){const p=create();p.y=rnd(0,H);p.life=rnd(0.1,1);particles.push(p);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.6)particles.push(create());
    particles.push(create());
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.wobble+=p.wobbleSpeed;p.x+=p.speedX+Math.sin(p.wobble)*p.wobbleAmp;p.y-=p.speedY;p.life-=p.decay;
      if(p.life<=0||p.y<-10){particles.splice(i,1);continue;}
      ctx.save();
      if(p.isEmber){
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);
        g.addColorStop(0,p.color+(p.life*0.9)+')');g.addColorStop(0.4,p.color+(p.life*0.4)+')');g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*4,0,Math.PI*2);ctx.fill();
      } else {
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
        g.addColorStop(0,p.color+(p.life*0.6)+')');g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=p.color+p.life+')';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
    if(particles.length>300)particles.splice(0,particles.length-300);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
