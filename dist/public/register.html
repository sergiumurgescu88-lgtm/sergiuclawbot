<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Înregistrare — AgentulMeu.online</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian: #050c18; --navy: #0a1628; --gold: #d97706; --gold-light: #f59e0b;
      --teal: #0d9488; --teal-light: #14b8a6; --warm-white: #f8f4ef;
      --muted: #8b9ab5; --border: rgba(255,255,255,0.08); --error: #f87171; --success: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--obsidian); color: var(--warm-white);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
      background-image: linear-gradient(rgba(13,148,136,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(13,148,136,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem; max-width: 480px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-family: 'DM Serif Display', serif; font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--warm-white); }
    input {
      width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: var(--warm-white); font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.2); }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--obsidian); font-weight: 700; padding: 0.875rem; border-radius: 14px;
      border: none; cursor: pointer; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(217,119,6,0.35); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border); color: var(--warm-white);
      margin-top: 1rem;
    }
    .btn-ghost:hover { border-color: var(--gold); }
    .status { margin-top: 1rem; font-size: 0.9rem; min-height: 1.5rem; text-align: center; }
    .status.error { color: var(--error); }
    .status.success { color: var(--success); }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--muted); }
    .footer a { color: var(--teal); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .password-wrap { position: relative; }
    .toggle-pass {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem;
    }
    .toggle-pass:hover { color: var(--warm-white); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Creează cont</h1>
    <p class="subtitle">Începe să-ți construiești agenții AI în 2 minute</p>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="username">Nume utilizator *</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="30" placeholder="ex: antreprenor_pro">
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required placeholder="nume@business.ro">
      </div>
      <div class="form-group">
        <label for="password">Parolă *</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" required minlength="6" placeholder="Minim 6 caractere">
          <button type="button" class="toggle-pass" onclick="togglePass()">Arată</button>
        </div>
      </div>
      <div class="form-group">
        <label for="full_name">Nume complet (opțional)</label>
        <input type="text" id="full_name" name="full_name" placeholder="Prenume Nume">
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        <span id="btnText">Creează cont gratuit</span>
      </button>
    </form>
    
    <div class="status" id="status"></div>
    
    <button class="btn btn-ghost" onclick="window.location.href='/login'">Ai deja cont? Autentifică-te</button>
    
    <div class="footer">
      Prin înregistrare accepți <a href="#">Termenii</a> și <a href="#">Politica de confidențialitate</a>.
    </div>
  </div>

  <script>
    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      event.target.textContent = p.type === 'password' ? 'Arată' : 'Ascunde';
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btnText.textContent = 'Se creează contul...';
      status.textContent = '';
      status.className = 'status';

      const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        full_name: document.getElementById('full_name').value.trim()
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        
        if (!res.ok) throw new Error(json.error || 'Eroare la înregistrare');
        
        status.textContent = '✓ Cont creat! Te redirecționăm...',
        status.className = 'status success';
        
        // Salvează token dacă e returnat
        if (json.token) localStorage.setItem('agentulmeu_token', json.token);
        
        // Redirect după 1.5s
        setTimeout(() => {
          window.location.href = json.redirect || '/dashboard';
        }, 1500);
        
      } catch (err) {
        console.error(err);
        status.textContent = '✗ ' + err.message;
        status.className = 'status error';
        btn.disabled = false;
        btnText.textContent = 'Creează cont gratuit';
      }
    };
  </script>
</body>
</html>
