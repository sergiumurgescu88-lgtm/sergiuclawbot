<title>AgentulMeu</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#111;--border:#222;--gold:#c9a84c;--text:#fff;--muted:#aaa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
header{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 0}
.hdr{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--gold);font-weight:700}
.nav{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.nav a,.nav button{color:var(--muted);font-size:14px;font-weight:500;transition:.2s;background:none;border:none;cursor:pointer}
.nav a:hover,.nav button:hover{color:var(--gold)}
.btn-gold{background:var(--gold);color:#000;padding:8px 16px;border-radius:6px;font-weight:600}
.btn-gold:hover{background:#d4b35a;color:#000}
main{padding-top:80px;max-width:1200px;margin:0 auto;padding-left:20px;padding-right:20px}
</style>
<link rel="stylesheet" href="/assets/light.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/global.js"></script>
</head>
<body>
<header><div class="hdr">

    <a href="/profile">Contul Meu</a>
    <a href="/docs">Docs</a>
    <a href="/login" id="authBtn" class="btn-gold">Login</a>
  </div>
</div></header>
<main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const sb = window.supabase.createClient('https://jwyxywlseonoazarhlzv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3eXh5d2xzZW9ub2F6YXJobHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjg1NTMsImV4cCI6MjA5NDAwNDU1M30.L-yq0ibWJ3IbPazd09D1t1Qae1GgwCVh3bM8QzRWquI');
  const btn = document.getElementById('authBtn');
  sb.auth.getSession().then(({  { session } }) => {
    if(session){
      btn.textContent = 'Logout';
      btn.href = '#';
      btn.onclick = (e) => { e.preventDefault(); sb.auth.signOut().then(() => location.href = '/login'); };
    }
  });
})();
</script>
