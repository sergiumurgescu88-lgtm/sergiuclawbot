  <style>
/* MOBILE-INJECT-AGENTULMEU */

/* ════════════════════════════════════════════════════
   MOBILE GLOBAL — @media max-width:768px
   NU modifica structura desktop!
   ════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Previne scroll orizontal */
  html, body {
    overflow-x: hidden !important;
    width: 100% !important;
    max-width: 100vw !important;
  }
  * { box-sizing: border-box; }

  /* ── Navbar ── */
  nav, header nav, .navbar, .nav-container {
    padding: 10px 16px !important;
    flex-wrap: wrap !important;
  }
  .nav-links, nav ul, .nav-menu {
    display: none !important;
  }
  .nav-links.open, .nav-menu.open, .mobile-menu.open, .mobile-nav.open {
    display: flex !important;
    flex-direction: column !important;
    width: 100% !important;
    padding: 10px 0 !important;
    gap: 6px !important;
    background: rgba(0,0,0,0.95) !important;
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    height: 100vh !important;
    z-index: 9999 !important;
    justify-content: center !important;
    align-items: center !important;
  }
  .hamburger, .menu-toggle, .mobile-toggle, button.hamburger {
    display: flex !important;
    font-size: 1.6rem !important;
    cursor: pointer !important;
    background: transparent !important;
    border: none !important;
    color: inherit !important;
    z-index: 10000 !important;
  }

  /* ── Tipografie ── */
  h1 { font-size: clamp(1.6rem, 5vw, 2.2rem) !important; line-height: 1.25 !important; }
  h2 { font-size: clamp(1.2rem, 4vw, 1.6rem) !important; }
  h3 { font-size: clamp(1rem, 3.5vw, 1.3rem) !important; }
  p, li, label, input, textarea, select {
    font-size: clamp(0.85rem, 3.2vw, 1rem) !important;
  }

  /* ── Butoane ── */
  .btn, button:not(.hamburger):not(.menu-toggle):not(.mobile-toggle):not([class*="icon"]),
  a.btn, a.button, .cta-btn, .cta-button {
    width: 100% !important;
    max-width: 400px !important;
    padding: 12px 20px !important;
    font-size: 0.95rem !important;
    display: block !important;
    margin: 6px auto !important;
    text-align: center !important;
  }

  /* ── Grid-uri generice → 1 coloana ── */
  .grid, [class*="grid-"], [class*="-grid"],
  .features-grid, .cards-grid, .plans-grid,
  .stats-grid, .agents-grid, .steps-grid {
    grid-template-columns: 1fr !important;
    gap: 16px !important;
  }

  /* ── Carduri ── */
  .card, [class*="card"], .plan, .feature, .step-card {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 16px !important;
  }

  /* ── Secțiuni cu padding mare ── */
  section, .section, .hero, .container, [class*="-section"] {
    padding-left: 16px !important;
    padding-right: 16px !important;
  }
  .hero, .hero-section {
    padding-top: 60px !important;
    padding-bottom: 40px !important;
    min-height: unset !important;
  }

  /* ── Input-uri / forms ── */
  input[type="text"], input[type="email"], input[type="password"],
  input[type="number"], input[type="tel"], input[type="url"],
  textarea, select {
    width: 100% !important;
    padding: 10px 12px !important;
    font-size: 16px !important; /* previne zoom pe iOS */
  }

  /* ── Code blocks ── */
  pre, code, .code-block, .terminal, .install-cmd {
    font-size: 0.78rem !important;
    overflow-x: auto !important;
    max-width: 100% !important;
    white-space: pre-wrap !important;
    word-break: break-all !important;
    padding: 10px !important;
  }

  /* ── Imagini ── */
  img { max-width: 100% !important; height: auto !important; }

  /* ── Flex rows → column ── */
  .flex-row, .row, .d-flex:not(.d-flex-column) {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 12px !important;
  }

  /* ── Footer ── */
  footer, .footer {
    padding: 20px 16px !important;
    font-size: 0.8rem !important;
    text-align: center !important;
  }
  footer .flex-row, footer .row {
    flex-direction: column !important;
    gap: 8px !important;
  }
}


@media (max-width: 768px) {
  /* Hero */
  .hero-content, .hero-text { text-align: center !important; padding: 0 8px !important; }
  .hero-badges, .hero-checks { flex-direction: column !important; align-items: center !important; gap: 6px !important; }
  .hero-actions { flex-direction: column !important; align-items: center !important; gap: 10px !important; }

  /* Badge Hermes versiune */
  .version-badge, .badge {
    font-size: 0.72rem !important;
    padding: 4px 10px !important;
    margin-bottom: 12px !important;
  }

  /* Features grid */
  .features-grid { grid-template-columns: 1fr !important; }
  .feature-card { padding: 16px !important; }
  .feature-icon { font-size: 2rem !important; }

  /* How it works */
  .steps-grid, .how-it-works-grid { grid-template-columns: 1fr !important; }
  .step { padding: 16px !important; }

  /* Pricing */
  .pricing-grid, .plans-container {
    grid-template-columns: 1fr !important;
    max-width: 400px !important;
    margin: 0 auto !important;
  }
  .plan-card, .pricing-card { margin: 0 !important; }
  .plan-card.featured, .pricing-card.popular {
    transform: none !important;
    order: -1 !important;
  }
  .plan-price, .price { font-size: 2rem !important; }

  /* Testimonials */
  .testimonials-grid { grid-template-columns: 1fr !important; }
  .testimonial { padding: 16px !important; }

  /* FAQ */
  .faq-item { padding: 14px 16px !important; }

  /* CTA final */
  .cta-section { padding: 40px 16px !important; }
  .cta-section h2 { font-size: 1.4rem !important; }

  /* Quick start code */
  .quick-start code, .install-code {
    font-size: 0.75rem !important;
    word-break: break-all !important;
    padding: 12px !important;
  }

  /* Sparks canvas — nu acoperă content */
  #sparks-canvas, canvas.sparks {
    pointer-events: none !important;
    opacity: 0.3 !important;
  }

  /* Scroll indicator / arrows */
  .scroll-indicator { display: none !important; }
}

</style>

</style>
<style>
/* NAV-MOBILE-FIX */
@media (max-width: 768px) {
  /* Ascunde meniul mobil by default — apare doar cu .open */
  .mobile-menu,
  .mobile-nav,
  nav ul.mobile,
  [class*="mobile-menu"],
  [class*="mobile-nav"] {
    display: none !important;
    visibility: hidden !important;
    height: 0 !important;
    overflow: hidden !important;
    pointer-events: none !important;
  }
  .mobile-menu.open,
  .mobile-nav.open,
  [class*="mobile-menu"].open,
  [class*="mobile-nav"].open {
    display: flex !important;

    top: 0; left: 0;
