<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Agent — AgentulMeu.online</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060d1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(59,130,246,0.4);
      --text: #e2e8f0;
      --muted: #64748b;
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.15);
      --emerald: #10b981;
      --gold: #f59e0b;
      --sidebar-w: 260px;
      --radius: 14px;
    }

    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: rgba(10,22,40,0.9);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .logo h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .logo p { font-size: 11px; color: var(--muted); }

    #new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      background: var(--blue-dim);
      border: 1px solid rgba(59,130,246,0.3);
      color: #93c5fd;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    #new-chat-btn:hover { background: rgba(59,130,246,0.25); }

    .sidebar-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 14px 16px 6px;
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .history-item {
      padding: 9px 10px;
      border-radius: 9px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .history-item:hover, .history-item.active {
      background: var(--surface);
      color: var(--text);
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    /* Settings panel */
    #settings-panel {
      background: rgba(6,13,26,0.98);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
    }
    #settings-panel.open { display: block; }

    .settings-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      display: block;
    }

    .settings-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    .settings-input:focus { border-color: var(--blue); }

    .settings-btn {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      background: var(--blue);
      border: none;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .settings-btn:hover { background: #2563eb; }

    #settings-toggle {
      width: 100%;
      padding: 8px 10px;
      border-radius: 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    #settings-toggle:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    /* ===== MAIN AREA ===== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,13,26,0.6);
      backdrop-filter: blur(10px);
    }

    #mobile-menu-btn {
      display: none;
      background: none; border: none;
      color: var(--text); font-size: 18px; cursor: pointer;
    }

    #agent-selector {
      display: flex; gap: 6px; flex-wrap: wrap;
    }

    .agent-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .agent-chip:hover { border-color: var(--border-hover); color: var(--text); }
    .agent-chip.active {
      background: var(--blue-dim);
      border-color: rgba(59,130,246,0.5);
      color: #93c5fd;
    }

    #status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.online { background: var(--emerald); box-shadow: 0 0 6px rgba(16,185,129,0.5); }

    /* Chat area */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    /* Welcome */
    #welcome {
      text-align: center;
      padding: 60px 20px;
      max-width: 480px;
      margin: auto;
    }
    #welcome .big-icon { font-size: 52px; margin-bottom: 20px; display: block; }
    #welcome h2 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    #welcome p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .quick-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .quick-btn {
      padding: 11px 14px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .quick-btn:hover { border-color: var(--border-hover); background: var(--blue-dim); }

    /* Messages */
    .msg { display: flex; gap: 12px; max-width: 800px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg.assistant .msg-avatar { background: linear-gradient(135deg, #3b82f6, #10b981); }
    .msg.user .msg-avatar { background: rgba(255,255,255,0.08); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 600px;
    }
    .msg.assistant .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(59,130,246,0.3);
      border-bottom-right-radius: 4px;
      color: #dbeafe;
    }

    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble pre code { background: none; padding: 0; }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 4px; padding: 14px 16px;
      align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input area */
    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: rgba(6,13,26,0.8);
      backdrop-filter: blur(10px);
    }

    #input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    #input-wrapper:focus-within { border-color: rgba(59,130,246,0.5); }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }
    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #2563eb; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    #input-footer {
      display: flex; justify-content: space-between;
      padding: 6px 4px 0;
      font-size: 11px;
      color: var(--muted);
    }

    /* System prompt panel */
    #prompt-panel {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      display: none;
    }
    #prompt-panel.open { display: block; }
    #prompt-panel label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }
    #system-prompt-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 12px;
      resize: vertical;
      min-height: 70px;
      font-family: inherit;
      outline: none;
    }
    #system-prompt-input:focus { border-color: var(--blue); }

    /* Error toast */
    #error-toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #dc2626;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Mobile */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #mobile-menu-btn { display: block; }
      .quick-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">🔱</div>
      <div>
        <h1>Hermes Agent</h1>
        <p>by Nous Research</p>
      </div>
    </div>
    <button id="new-chat-btn">✦ Conversație nouă</button>
  </div>

  <div class="sidebar-section-title">Istoric</div>
  <div id="history-list"></div>

  <div class="sidebar-footer">
    <button id="settings-toggle">⚙ Configurare API Key</button>
  </div>
  <div id="settings-panel">
    <label class="settings-label">🔑 Anthropic API Key</label>
    <input type="password" class="settings-input" id="api-key-input" placeholder="sk-ant-...">
    <label class="settings-label">📋 System Prompt</label>
    <textarea class="settings-input" id="default-system-prompt" rows="4" placeholder="Ești Hermes, un agent AI avansat..."></textarea>
    <button class="settings-btn" id="save-settings-btn">Salvează</button>
  </div>
</aside>

<!-- MAIN -->
<main id="main">

  <!-- Topbar -->
  <div id="topbar">
    <button id="mobile-menu-btn">☰</button>

    <div id="agent-selector">
      <button class="agent-chip active" data-agent="Hermes">🔱 Hermes</button>
      <button class="agent-chip" data-agent="Hunter">🎯 Hunter</button>
      <button class="agent-chip" data-agent="Writer">✍ Writer</button>
      <button class="agent-chip" data-agent="Closer">💼 Closer</button>
      <button class="agent-chip" data-agent="Analyst">📊 Analyst</button>
    </div>

    <div id="status-dot">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">Deconectat</span>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="welcome">
      <span class="big-icon">🔱</span>
      <h2>Bine ai venit la Hermes</h2>
      <p>Agent AI avansat by Nous Research. Conectează-l prin API key propriu și trimite prima comandă.</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('Cine ești și ce poți face?')">🤖 Prezintă-te</button>
        <button class="quick-btn" onclick="sendQuick('/build_agents business=demo')">⚡ Build Agents</button>
        <button class="quick-btn" onclick="sendQuick('Cum pot genera lead-uri prin Telegram?')">📱 Ghid Telegram</button>
        <button class="quick-btn" onclick="sendQuick('Explică-mi cum funcționează memoria persistentă')">🧠 Memorie</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div id="prompt-panel">
      <label>System Prompt (editabil)</label>
      <textarea id="system-prompt-input"></textarea>
    </div>
    <div id="input-wrapper">
      <textarea
        id="message-input"
        placeholder="Trimite un mesaj lui Hermes..."
        rows="1"
      ></textarea>
      <button id="send-btn" title="Trimite (Enter)">↑</button>
    </div>
    <div id="input-footer">
      <button onclick="togglePromptPanel()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;">⚙ System Prompt</button>
      <span>Enter = trimite · Shift+Enter = rând nou</span>
    </div>
  </div>

</main>

<div id="error-toast"></div>

<script>
// ===== STATE =====
let conversations = JSON.parse(localStorage.getItem('hermes_convs') || '{}')
let currentId = null
let apiKey = localStorage.getItem('hermes_api_key') || ''
let selectedAgent = 'Hermes'
let isLoading = false

const DEFAULT_SYSTEM = `Ești Hermes, un agent AI avansat creat de Nous Research. Ajuți utilizatorii români să automatizeze procese de business prin sub-agenți specializați (Hunter, Writer, Closer, Analyst). Răspunzi în română, ești concis, direct și orientat spre acțiune. Cunoști comenzile Hermes: /build_agents, /run_agent, /memory_search.`

// ===== DOM =====
const chatArea = document.getElementById('chat-area')
const messageInput = document.getElementById('message-input')
const sendBtn = document.getElementById('send-btn')
const historyList = document.getElementById('history-list')
const welcome = document.getElementById('welcome')
const connDot = document.getElementById('conn-dot')
const connLabel = document.getElementById('conn-label')
const errorToast = document.getElementById('error-toast')

// ===== INIT =====
document.getElementById('api-key-input').value = apiKey
document.getElementById('default-system-prompt').value = localStorage.getItem('hermes_system') || DEFAULT_SYSTEM
document.getElementById('system-prompt-input').value = localStorage.getItem('hermes_system') || DEFAULT_SYSTEM

updateStatus()
renderHistory()
newChat()

// ===== EVENTS =====
document.getElementById('new-chat-btn').onclick = newChat
document.getElementById('save-settings-btn').onclick = saveSettings
document.getElementById('settings-toggle').onclick = () => {
  document.getElementById('settings-panel').classList.toggle('open')
}
document.getElementById('mobile-menu-btn').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open')
}

document.querySelectorAll('.agent-chip').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.agent-chip').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    selectedAgent = btn.dataset.agent
  }
})

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    send()
  }
})

messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto'
  messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px'
})

sendBtn.onclick = send

// ===== FUNCTIONS =====
function updateStatus() {
  const hasKey = !!apiKey.trim()
  connDot.className = 'dot' + (hasKey ? ' online' : '')
  connLabel.textContent = hasKey ? 'API Key conectat' : 'Necesită API Key'
}

function saveSettings() {
  apiKey = document.getElementById('api-key-input').value.trim()
  const sys = document.getElementById('default-system-prompt').value.trim()
  localStorage.setItem('hermes_api_key', apiKey)
  localStorage.setItem('hermes_system', sys || DEFAULT_SYSTEM)
  document.getElementById('system-prompt-input').value = sys || DEFAULT_SYSTEM
  document.getElementById('settings-panel').classList.remove('open')
  updateStatus()
  showToast('✓ Salvat!', '#10b981')
}

function newChat() {
  currentId = Date.now().toString()
  conversations[currentId] = { title: 'Conversație nouă', messages: [] }
  saveConvs()
  renderHistory()
  renderMessages([])
}

function renderHistory() {
  historyList.innerHTML = ''
  const ids = Object.keys(conversations).sort((a, b) => b - a)
  ids.forEach(id => {
    const conv = conversations[id]
    const el = document.createElement('div')
    el.className = 'history-item' + (id === currentId ? ' active' : '')
    el.textContent = conv.title
    el.onclick = () => loadConv(id)
    historyList.appendChild(el)
  })
}

function loadConv(id) {
  currentId = id
  renderHistory()
  renderMessages(conversations[id].messages)
}

function renderMessages(msgs) {
  chatArea.innerHTML = ''
  if (msgs.length === 0) {
    chatArea.appendChild(welcome.cloneNode(true))
    // Re-attach event listeners for quick buttons in clone
    chatArea.querySelectorAll('.quick-btn').forEach(btn => {
      btn.onclick = () => sendQuick(btn.textContent.trim().replace(/^[^\w]+ /, ''))
    })
    return
  }
  msgs.forEach(m => appendMessage(m.role, m.content, false))
}

function appendMessage(role, content, scroll = true) {
  // Remove welcome if present
  const w = chatArea.querySelector('#welcome')
  if (w) w.remove()

  const msgEl = document.createElement('div')
  msgEl.className = `msg ${role}`

  const avatar = document.createElement('div')
  avatar.className = 'msg-avatar'
  avatar.textContent = role === 'assistant' ? '🔱' : '👤'

  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble'
  bubble.innerHTML = formatContent(content)

  msgEl.appendChild(avatar)
  msgEl.appendChild(bubble)
  chatArea.appendChild(msgEl)

  if (scroll) chatArea.scrollTop = chatArea.scrollHeight
  return msgEl
}

function formatContent(text) {
  // Basic markdown: code blocks, inline code, bold
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
}

function showTyping() {
  const el = document.createElement('div')
  el.className = 'msg assistant'
  el.id = 'typing-msg'
  el.innerHTML = `
    <div class="msg-avatar">🔱</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `
  chatArea.appendChild(el)
  chatArea.scrollTop = chatArea.scrollHeight
}

function removeTyping() {
  const el = document.getElementById('typing-msg')
  if (el) el.remove()
}

async function send() {
  if (isLoading) return
  const text = messageInput.value.trim()
  if (!text) return

  if (!apiKey) {
    showToast('⚠️ Adaugă API Key în setări', '#f59e0b')
    document.getElementById('settings-panel').classList.add('open')
    return
  }

  messageInput.value = ''
  messageInput.style.height = 'auto'
  isLoading = true
  sendBtn.disabled = true

  // Add to conv
  const conv = conversations[currentId]
  conv.messages.push({ role: 'user', content: text })
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 40) + (text.length > 40 ? '...' : '')
  }
  saveConvs()
  renderHistory()
  appendMessage('user', text)
  showTyping()

  const systemPrompt = document.getElementById('system-prompt-input').value.trim()
    || DEFAULT_SYSTEM

  const agentContext = selectedAgent !== 'Hermes'
    ? `\n\nActualment operezi ca sub-agentul ${selectedAgent.toUpperCase()}.`
    : ''

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt + agentContext,
        messages: conv.messages.slice(-20).map(m => ({ role: m.role, content: m.content }))
      })
    })

    const data = await response.json()

    if (!response.ok) {
      throw new Error(data.error?.message || `API Error ${response.status}`)
    }

    const reply = data.content?.[0]?.text || '(răspuns gol)'
    removeTyping()
    conv.messages.push({ role: 'assistant', content: reply })
    saveConvs()
    appendMessage('assistant', reply)

  } catch (err) {
    removeTyping()
    showToast('❌ ' + err.message, '#dc2626')
    appendMessage('assistant', `❌ Eroare: ${err.message}\n\nVerifică API Key-ul în setări.`)
  }

  isLoading = false
  sendBtn.disabled = false
  messageInput.focus()
}

function sendQuick(text) {
  messageInput.value = text
  send()
}

function togglePromptPanel() {
  document.getElementById('prompt-panel').classList.toggle('open')
}

function saveConvs() {
  // Keep only last 50 conversations
  const ids = Object.keys(conversations).sort((a, b) => b - a)
  if (ids.length > 50) {
    ids.slice(50).forEach(id => delete conversations[id])
  }
  localStorage.setItem('hermes_convs', JSON.stringify(conversations))
}

function showToast(msg, color = '#3b82f6') {
  const toast = document.getElementById('error-toast')
  toast.textContent = msg
  toast.style.background = color
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 3000)
}
</script>
</body>
